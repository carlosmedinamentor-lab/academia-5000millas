<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Curso de Academia 5.000 Millas — Transformación personal con el Método BDL.">
  <meta name="author" content="Carlos Medina">
  <meta property="og:title" content="Curso — Academia 5.000 Millas">
  <meta property="og:description" content="Transforma tu identidad con el Método BDL. Cursos de desarrollo personal.">
  <meta property="og:image" content="https://img.youtube.com/vi/18S7wyLvZYw/maxresdefault.jpg">
  <meta property="og:url" content="https://5000millas.com/curso">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Curso — Academia 5.000 Millas">
  <meta name="twitter:description" content="Cursos de transformación personal. Método BDL: ⛵ + 💎 = 🦁">
  <meta name="twitter:image" content="https://img.youtube.com/vi/18S7wyLvZYw/maxresdefault.jpg">
  <title>Curso — Academia 5.000 Millas</title>
  <link rel="stylesheet" href="css/academia.css?v=2">
  <link rel="stylesheet" href="css/academia-premium.css?v=2">
</head>
<body>

  <div id="header"></div>

  <main class="curso-page">
    <div class="container">
      <!-- Video principal -->
      <div class="curso-video-main" id="videoMainContainer"></div>

      <!-- Layout 2 columnas -->
      <div class="curso-layout">
        <!-- Columna principal -->
        <div class="curso-main" id="cursoMain"></div>

        <!-- Sidebar sticky -->
        <aside class="curso-sidebar" id="cursoSidebar"></aside>
      </div>

      <!-- Cursos relacionados -->
      <div class="relacionados" id="cursosRelacionados"></div>
    </div>
  </main>

  <div id="footer"></div>
  <div id="modalContainer"></div>

  <script src="js/cursos-data.js?v=2"></script>
  <script src="js/componentes.js?v=2"></script>
  <script>
    document.getElementById('header').innerHTML = renderHeader('cursos');
    document.getElementById('footer').innerHTML = renderFooter();

    const params = new URLSearchParams(window.location.search);
    const cursoId = params.get('id');
    const curso = getCurso(cursoId);

    if (!curso) {
      document.getElementById('cursoMain').innerHTML = `
        <div style="text-align:center;padding:4rem 0;">
          <h2 style="font-family:var(--font-display);margin-bottom:1rem;">Curso no encontrado</h2>
          <p style="color:var(--blanco-muted);margin-bottom:2rem;">El curso que buscas no existe o ha sido movido.</p>
          <a href="catalogo.html" class="btn btn-primary">Ver todos los cursos</a>
        </div>
      `;
      document.getElementById('cursoSidebar').style.display = 'none';
    } else {
      const cat = CATEGORIAS[curso.categoria];

      // SEO
      setMetaTags(curso.titulo, curso.descripcion);
      addCourseSchema(curso);

      // Video principal — gated: requiere registro
      const videoContainer = document.getElementById('videoMainContainer');
      if (isRegistered()) {
        const embedUrl = getYouTubeEmbedUrl(curso);
        if (embedUrl) {
          videoContainer.innerHTML = `<iframe src="${embedUrl}" title="${curso.titulo}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
        } else {
          videoContainer.innerHTML = `<div class="curso-video-placeholder">${cat.emoji}</div>`;
        }
      } else {
        const thumbUrl = getVideoThumbnail(curso);
        videoContainer.innerHTML = renderVideoGate(thumbUrl, curso.id, cat.emoji);
      }

      // Main content
      document.getElementById('cursoMain').innerHTML = `
        <div class="curso-breadcrumb">
          <a href="index.html">Inicio</a> / <a href="catalogo.html">Cursos</a> / <a href="catalogo.html?cat=${curso.categoria}">${cat.emoji} ${cat.nombre}</a> / ${curso.titulo}
        </div>

        <div style="display:flex;gap:0.5rem;margin-bottom:1rem;">
          <span class="badge badge-${curso.categoria}">${cat.emoji} ${cat.nombre}</span>
          ${curso.gratuito ? '<span class="badge badge-gratis">Gratuito</span>' : '<span class="badge badge-premium">Premium</span>'}
        </div>

        <h1 class="curso-titulo">${curso.titulo}</h1>
        <p class="curso-subtitulo-page">${curso.subtitulo}</p>
        <p class="curso-descripcion">${curso.descripcion}</p>

        ${curso.thumbnail ? `
        <div style="margin:2rem 0;text-align:center;">
          <img src="${curso.thumbnail}" alt="${curso.titulo}" loading="lazy" style="max-width:600px;width:100%;border-radius:8px;box-shadow:0 12px 40px rgba(0,0,0,0.4);">
        </div>` : ''}

        ${!curso.gratuito ? `
        <div style="margin:2rem 0;">
          <h2 class="modulos-titulo">Qu&eacute; incluye</h2>
          <div class="value-grid" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr));">
            <div class="glass-card value-item">
              <span class="value-icon">&#127909;</span>
              <div class="value-title">${curso.totalLecciones} Videos</div>
              <div class="value-desc">Contenido exclusivo de inmersi&oacute;n total.</div>
            </div>
            <div class="glass-card value-item">
              <span class="value-icon">&#128214;</span>
              <div class="value-title">Workbook Premium</div>
              <div class="value-desc">Ejercicios pr&aacute;cticos para cada lecci&oacute;n.</div>
            </div>
            <div class="glass-card value-item">
              <span class="value-icon">&#127942;</span>
              <div class="value-title">Certificado</div>
              <div class="value-desc">Certificado de completaci&oacute;n descargable.</div>
            </div>
          </div>
          ${curso.id === 'despierta-7-dias' ? '<div style="text-align:center;margin-top:1.5rem;"><img src="images/planificacion-semanal.svg" alt="Planificaci&oacute;n semanal" loading="lazy" style="max-width:500px;width:100%;border-radius:8px;"></div>' : ''}
        </div>` : ''}

        <div class="modulos">
          <h2 class="modulos-titulo">Contenido del curso</h2>
          ${renderModulos(curso)}
        </div>

        ${!curso.gratuito ? `
        <div class="guarantee" style="margin-top:2rem;">
          <div style="text-align:center;margin-bottom:1rem;">
            <img src="images/garantia-badges.svg" alt="Garant&iacute;a 100% + Reembolso 7 d&iacute;as" loading="lazy" style="max-width:400px;width:100%;">
          </div>
          <h3>Garant&iacute;a de Transformaci&oacute;n</h3>
          <p>Si no transforma tu perspectiva, te devolvemos el 100% de tu inversi&oacute;n en los primeros 7 d&iacute;as. Sin preguntas.</p>
        </div>` : ''}
      `;

      // Sidebar
      const ctaButton = curso.gratuito
        ? `<button class="btn btn-primary sidebar-cta" onclick="abrirModal('${curso.id}')">Empezar ahora — Gratis</button>`
        : `<a href="${curso.stripeLink || 'academia/desafio-7-dias.html'}" class="btn-stripe sidebar-cta" style="width:100%;text-align:center;">Acceder — €${curso.precio || 47}</a>`;

      document.getElementById('cursoSidebar').innerHTML = `
        <div class="sidebar-card">
          <div class="sidebar-meta">
            <div class="sidebar-meta-item">
              <span class="sidebar-meta-label">Categoría</span>
              <span class="sidebar-meta-value">${cat.emoji} ${cat.nombre}</span>
            </div>
            <div class="sidebar-meta-item">
              <span class="sidebar-meta-label">Nivel</span>
              <span class="sidebar-meta-value">${curso.nivel}</span>
            </div>
            <div class="sidebar-meta-item">
              <span class="sidebar-meta-label">Duración</span>
              <span class="sidebar-meta-value">${curso.duracion}</span>
            </div>
            <div class="sidebar-meta-item">
              <span class="sidebar-meta-label">Lecciones</span>
              <span class="sidebar-meta-value">${curso.totalLecciones}</span>
            </div>
            <div class="sidebar-meta-item">
              <span class="sidebar-meta-label">Precio</span>
              <span class="sidebar-meta-value">${curso.gratuito ? 'Gratuito' : '€' + (curso.precio || 'Premium')}</span>
            </div>
          </div>
          ${ctaButton}
          <ul class="sidebar-beneficios">
            ${curso.beneficios.map(b => `<li>${b}</li>`).join('')}
          </ul>
        </div>
      `;

      // Cursos relacionados
      const relacionados = getCursosRelacionados(curso.id);
      if (relacionados.length > 0) {
        document.getElementById('cursosRelacionados').innerHTML = `
          <h3 style="font-family:var(--font-display);font-size:1.25rem;margin-bottom:1.5rem;">Cursos relacionados</h3>
          <div class="cursos-grid">${relacionados.map(renderCursoCard).join('')}</div>
        `;
      }

      // Modal
      document.getElementById('modalContainer').innerHTML = renderModal();
    }

    initComponents();
  </script>
</body>
</html>
